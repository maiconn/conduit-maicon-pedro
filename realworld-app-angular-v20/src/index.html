<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RealworldApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="//code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet" type="text/css">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
  <script>
// Polyfill: Istanbul instrumenta para Node.js (global), browser precisa de window
window.global = window;
window.__coverage__ = window.__coverage__ || {};

(function() {
  var INTERVAL = 5000;
  var lastSent = '';

  function sendCoverage() {
    if (!window.__coverage__) return;
    var current = JSON.stringify(window.__coverage__);
    if (current === lastSent) return;
    lastSent = current;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/coverage/save', true);
    xhr.setRequestHeader('Content-Type', 'text/plain');
    try { xhr.send(current); } catch(e) {}
  }

  setInterval(sendCoverage, INTERVAL);
  window.addEventListener('beforeunload', function() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/coverage/save', false);
    xhr.setRequestHeader('Content-Type', 'text/plain');
    try { xhr.send(JSON.stringify(window.__coverage__ || {})); } catch(e) {}
  });
})();
  </script>
</body>
</html>
